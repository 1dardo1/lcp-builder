name: Acceptance Tests - Android

# Manual (workflow_dispatch, para lanzarlo solo desde la pestaña Actions) o
# reutilizable (workflow_call, para que acceptance-tests.yml lo llame junto
# con el de Linux) — mismo job en los dos casos, sin duplicar nada. Ver
# "Flujo Mostrar/Editar" en app/README.md y vault/Aprendizajes/Principios y
# decisiones clave.md: este es el único test que ejercita de verdad el
# canal nativo (AndroidSafFileWriter/Reader) donde vivían los bugs reales
# de guardado corregidos en #37/#38/#39.
on:
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  android-emulator:
    runs-on: ubuntu-latest
    # Sin esto, un cuelgue real (visto una vez: el job se quedó sin dar
    # ninguna señal tras instalar el APK, sin error ni progreso) se come
    # las 360 min por defecto de un job de GitHub Actions antes de que
    # nadie se entere. Con las 20 entidades del ciclo completo
    # (crear_editar_todas_entidades_acceptance_test.dart) además del test
    # de fabricante ya existente, un run normal puede tardar bastante más
    # que los 6-7 min de cuando solo había un test — margen generoso, no
    # medido todavía en un run real.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Habilitar KVM para el emulador
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Test de aceptación en emulador Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          # AVD sin ventana gráfica — no hace falta interfaz real, el test
          # solo necesita el runtime de Android.
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          # Visto dos veces (runs reales): el step se queda colgado justo
          # después de instalar el APK, sin ninguna línea de test — a
          # diferencia de fallos anteriores (localización, validación,
          # viewport, snackbar), que sí llegaban a ejecutar el test y
          # mostraban un fallo concreto. Sin ninguna pista de la causa,
          # solo se puede mejorar el diagnóstico para el próximo run, no
          # "arreglar" nada a ciegas:
          # - `timeout` interno (1200s, por debajo de los 30 min del job)
          #   para que el propio step falle limpio si vuelve a colgarse,
          #   en vez de depender de que el job entero se cancele (eso no
          #   deja ni rastro en el log, ver PR con el timeout-minutes).
          # - `--verbose` en `flutter test`, para ver en el log en
          #   directo qué está esperando la herramienta mientras no hay
          #   salida de test.
          # - `adb logcat` en segundo plano, volcado al final — puede
          #   revelar un crash/ANR del lado nativo que Flutter nunca
          #   llega a reportar.
          #
          # Todo en una única línea lógica (el `>-` de YAML pliega estas
          # líneas en una sola) porque este `script` de
          # reactivecircus/android-emulator-runner ejecuta cada línea
          # como una invocación de shell independiente, no un script
          # multilínea con estado compartido (ver PR del fix de `cd app`).
          script: >-
            bash -c 'set -x; adb logcat -c; adb logcat > /tmp/logcat.txt &
            LOGCAT_PID=$!; cd app; timeout 1200 flutter test --verbose
            integration_test/editar_android_acceptance_test.dart
            integration_test/crear_editar_todas_entidades_acceptance_test.dart
            -d emulator-5554; EXIT=$?; kill $LOGCAT_PID 2>/dev/null || true;
            echo "--- últimas 300 líneas de logcat ---"; tail -n 300
            /tmp/logcat.txt; exit $EXIT'
