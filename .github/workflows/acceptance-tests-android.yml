name: Acceptance Tests - Android

# Manual (workflow_dispatch, para lanzarlo solo desde la pestaña Actions) o
# reutilizable (workflow_call, para que acceptance-tests.yml lo llame junto
# con el de Linux) — mismo job en los dos casos, sin duplicar nada. Ver
# "Flujo Mostrar/Editar" en app/README.md y vault/Aprendizajes/Principios y
# decisiones clave.md: este es el único test que ejercita de verdad el
# canal nativo (AndroidSafFileWriter/Reader) donde vivían los bugs reales
# de guardado corregidos en #37/#38/#39.
on:
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  android-emulator:
    runs-on: ubuntu-latest
    # Sin esto, un cuelgue real (visto una vez: el job se quedó sin dar
    # ninguna señal tras instalar el APK, sin error ni progreso) se come
    # las 360 min por defecto de un job de GitHub Actions antes de que
    # nadie se entere. Con las 20 entidades del ciclo completo
    # (crear_editar_todas_entidades_acceptance_test.dart) además del test
    # de fabricante ya existente, un run normal puede tardar bastante más
    # que los 6-7 min de cuando solo había un test — margen generoso, no
    # medido todavía en un run real.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Habilitar KVM para el emulador
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Test de aceptación en emulador Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          # AVD sin ventana gráfica — no hace falta interfaz real, el test
          # solo necesita el runtime de Android.
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          # Una sola línea: este `script` de reactivecircus/android-emulator-runner
          # ejecuta cada línea como una invocación de shell independiente (no
          # persiste el `cd` entre líneas), a diferencia de un `run:` normal de
          # GitHub Actions — con dos líneas, `flutter test` se ejecutaba desde la
          # raíz del repo y fallaba con "No pubspec.yaml file found".
          script: cd app && flutter test integration_test/editar_android_acceptance_test.dart integration_test/crear_editar_todas_entidades_acceptance_test.dart -d emulator-5554
