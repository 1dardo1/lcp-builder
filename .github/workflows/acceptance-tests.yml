name: Acceptance Tests - All

# Lanza los dos workflows de aceptación (Android + Linux) en un solo
# botón desde la pestaña Actions — cada uno también se puede lanzar por
# separado (acceptance-tests-android.yml / acceptance-tests-linux.yml).
# Los "uses:" de abajo son llamadas a esos mismos workflows como
# reutilizables (workflow_call): un solo sitio con los pasos de cada uno,
# nada duplicado entre este archivo y los otros dos.
on:
  workflow_dispatch: {}

jobs:
  android:
    uses: ./.github/workflows/acceptance-tests-android.yml

  linux:
    uses: ./.github/workflows/acceptance-tests-linux.yml
