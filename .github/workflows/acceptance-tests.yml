name: Acceptance Tests

# Solo manual (workflow_dispatch), mismo criterio que build-apk.yml: no
# tiene sentido levantar un emulador de Android o compilar el binario de
# Linux en cada commit todavía — se lanza a demanda desde la pestaña
# Actions. Ver "Flujo Mostrar/Editar" en app/README.md y
# vault/Aprendizajes/Principios y decisiones clave.md para el porqué de
# cada test: el de Android es el único que ejercita de verdad el canal
# nativo (AndroidSafFileWriter/Reader) donde vivían los bugs reales de
# guardado corregidos en #37/#38/#39; el de Linux es un smoke test que
# complementa los tests de aceptación ya existentes en
# test/application/use_cases/, que ya corren con E/S real de dart:io
# sobre este mismo Linux.
on:
  workflow_dispatch: {}

jobs:
  android-emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Habilitar KVM para el emulador
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Test de aceptación en emulador Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          # AVD sin ventana gráfica — no hace falta interfaz real, el test
          # solo necesita el runtime de Android.
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd app
            flutter test integration_test/editar_android_acceptance_test.dart -d emulator-5554

  linux-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable

      - name: Dependencias de Linux desktop + Xvfb
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev xvfb

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Habilitar Linux desktop
        working-directory: app
        run: flutter config --enable-linux-desktop

      - name: Smoke test de aceptación (binario real, bajo Xvfb)
        working-directory: app
        run: xvfb-run --auto-servernum flutter test integration_test/app_smoke_test.dart -d linux
