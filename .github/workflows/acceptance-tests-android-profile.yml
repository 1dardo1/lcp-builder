name: Acceptance Tests - Android (profile)

# Igual que acceptance-tests-android.yml pero corriendo la app en modo
# **profile** (AOT + tree-shaking) con `flutter drive`, en vez de debug
# (JIT) con `flutter test`. Cubre el ángulo que a la suite de debug se le
# escapa: fallos que solo aparecen cerca del release que instala la
# persona usuaria — un widget que revienta al construirse muestra el
# `ErrorWidget` gris en profile/release, no la pantalla roja de debug, así
# que `flutter test` (siempre debug) nunca lo vería. Requiere el driver
# `test_driver/integration_test.dart` y el FileProvider de test replicado
# en el source set `profile` (ver app/android/app/src/profile).
on:
  workflow_dispatch: {}
  workflow_call: {}
  # TEMPORAL: workflow_dispatch por API solo encuentra workflows que ya
  # están en la rama por defecto; este es nuevo, así que para validarlo en
  # su propia rama se dispara en push. Quitar antes de mergear — la
  # convención del repo es solo dispatch/call.
  push:
    branches: [claude/repo-contents-270i7m]

jobs:
  android-emulator-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Habilitar KVM para el emulador
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Test de aceptación en profile (flutter drive)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          # Mismo patrón de diagnóstico que el workflow de debug: logcat en
          # segundo plano, `timeout` interno para fallar limpio si se
          # cuelga, y `--verbose`. `flutter drive --profile` compila AOT e
          # instala el APK de profile, así que el primer arranque tarda más
          # que en debug — de ahí el margen.
          script: >-
            bash -c 'set -x; adb logcat -c; adb logcat > /tmp/logcat.txt &
            LOGCAT_PID=$!; cd app; timeout 1500 flutter drive --verbose
            --driver=test_driver/integration_test.dart
            --target=integration_test/crear_editar_todas_entidades_acceptance_test.dart
            --profile -d emulator-5554; EXIT=$?;
            kill $LOGCAT_PID 2>/dev/null || true;
            echo "--- últimas 300 líneas de logcat ---"; tail -n 300
            /tmp/logcat.txt; exit $EXIT'
